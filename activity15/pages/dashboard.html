<h1 class="page-title">Dashboard</h1>
<p class="page-sub">Riverside Community Garden · <span id="today">Thursday, July 2</span> </p>

<div class="stats" id="stats-grid">
    <!-- filled by renderStatCards() in app.js -->
</div>

<div class="panels-row">
    <div class="panel">
        <div class="panel-head">
            <h2>Recent plot assignments</h2>
            <a href="#" data-page="plots">View all plots</a>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Plot</th><th>Member</th><th>Assigned</th><th>Status</th></tr>
                </thead>
                <tbody id="assignments-body">
                    <!-- filled by renderAssignmentRows() in app.js -->
                </tbody>
            </table>
        </div>
    </div>
    <div class="panel">
        <div class="panel-head"><h2>Water usage this week</h2></div>
        <div id="water-bars">
            <!-- filled by renderWaterBars() in app.js -->
        </div>
    </div>
</div>
