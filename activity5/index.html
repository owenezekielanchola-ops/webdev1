<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
             <article>
           <div class="quote-card">
            <blockquote>
                "The best way to learn CSS is to break things and rebuild them."
            </blockquote>
            <cite>— A Wise Developer</cite>
        </div>
        </article>
        <article>
             <div class="stats">
            <div class="stat">
                <span class="num">128</span>
                <span class="label">Projects</span>
            </div>

            <div class="stat">
                <span class="num">4.9★</span>
                <span class="label">Rating</span>
            </div>

            <div class="stat">
                <span class="num">99%</span>
                <span class="label">Uptime</span>
            </div>
        </div>
        </article>
         <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email">
            <span class = "helper">We'll never share your email</span>    
        </div>
        <article>
             <div class="banner">
            <h2>
                Make it beautiful
            </h2>
            <p>
                CSS gradients can be applied to text not just backgrounds
            </p>
        </div>
        </article>
          <article>
           <div class="price-card">
            <p class="label">Premium Plan</p>
            <p class="old-price">P2400/yr</p>
            <p class="new-price">P1200/yr</p>
            <span class="save-badge">save 50%</span>
        </div> 
        </article>
    </main>
        </section>
       
      
    
</body>
</html>
