<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The CSS Grid Blueprint</title>
  <style>
    /* Global Reset & Page Styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      padding: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1e293b;
    }

    /* ===================================================
       THE CSS GRID BLUEPRINT CONTAINER
       =================================================== */
    .container {
      display: grid;                     /* Mandatory: Activates CSS Grid */
      
      /* 1. Columns & Rows */
      /* Creates 3 columns: Left & Right take 1 fraction, Middle takes twice as much space */
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 200px 1fr 200px;


      /* 2. Gaps */
      gap: 20px;                          /* Spacing between all rows and columns */

      /* 3. Named Areas 
         Note: In a 3-column layout, each row must define exactly 3 columns. 
         We've assigned the areas below to match your 3x2 structure perfectly. */
      grid-template-areas:
        "nav header header"
        "nav main   sidebar"
        "footer footer footer";
        
      min-height: 80vh; /* Gives the grid some height to visualize the layout */
    }

    /* ===================================================
       ASSIGNING CHILDREN TO AREAS
       =================================================== */
    .main-nav { 
      grid-area: nav; 
      background-color: #3b82f6; /* Blue */
    }
    
    .main-header { 
      grid-area: header; 
      background-color: #ef4444; /* Red */
    }

    .main-content { 
      grid-area: main; 
      background-color: #10b981; /* Green */
    }

    .sidebar {
      grid-area: sidebar;
      background-color: #f59e0b; /* Amber */
    }

    .main-footer { 
      grid-area: footer; 
      background-color: #64748b; /* Slate */
    }

    /* Common styling for grid items just to make them look good */
    .grid-item {
      color: white;
      padding: 20px;
      font-weight: bold;
      font-size: 1.2rem;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body>

  <h2>The CSS Grid Blueprint Demo</h2>

  <div class="container">
    
    <header class="grid-item main-header">Header (100px High)</header>
    <nav class="grid-item main-nav">Navigation (Spans 2 Rows)</nav>
    <main class="grid-item main-content">Main Content (2fr Wide)</main>
    <aside class="grid-item sidebar">Sidebar (1fr Wide)</aside>
    <footer class="grid-item main-footer">Footer (Spans All 3 Columns)</footer>

  </div>

</body>
</html>
